<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<title>お知らせ｜日本確認センター</title>
<meta name="description" content="日本確認センターからのお知らせ一覧。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="日本確認センター">
<meta property="og:locale" content="ja_JP">
<meta property="og:title" content="お知らせ｜日本確認センター">
<meta property="og:description" content="日本確認センターからのお知らせ一覧。">
<meta property="og:url" content="https://nihonkakuninn.vercel.app/news.html">
<meta property="og:image" content="https://nihonkakuninn.vercel.app/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="655">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="お知らせ｜日本確認センター">
<meta name="twitter:description" content="日本確認センターからのお知らせ一覧。">
<meta name="twitter:image" content="https://nihonkakuninn.vercel.app/assets/og-image.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ===================== お知らせ page ===================== */
.nw-main { padding: 58px 0 0; }
.nw-wrap { width: min(1080px, 100% - 48px); margin-inline: auto; }

.nw-hero { text-align: center; margin-bottom: 40px; }
.nw-hero__eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 0.18em; color: var(--blue-600); }
.nw-hero h1 { font-size: clamp(32px, 4.4vw, 50px); font-weight: 900; color: var(--navy-800); letter-spacing: 0.06em; margin-top: 8px; }
.nw-hero__rule { width: 64px; height: 4px; background: var(--blue-500); border-radius: 4px; margin: 16px auto; }
.nw-hero p { font-size: 16px; color: var(--ink-500); }

.nw-card {
  background: rgba(255,255,255,0.97); border: 1px solid var(--line);
  border-radius: var(--r-xl); box-shadow: var(--shadow-md);
  padding: 34px 40px 40px;
}
.nw-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.nw-filters { display: flex; gap: 12px; flex-wrap: wrap; }
.nw-filter {
  border: 1.6px solid var(--line); background: #fff; cursor: pointer;
  font-family: var(--font); font-size: 14.5px; font-weight: 800; color: var(--ink-500);
  padding: 9px 22px; border-radius: 999px; white-space: nowrap; transition: border-color 0.16s ease;
}
.nw-filter:hover { border-color: var(--blue-300, #9cc0f5); color: var(--blue-600); }
.nw-filter[data-cat="すべて"].active { background: var(--blue-600); border-color: var(--blue-600); color: #fff; }
.nw-filter[data-cat="重要"] { color: #d9482f; border-color: #f3c9c2; }
.nw-filter[data-cat="重要"].active { background: #d9482f; border-color: #d9482f; color: #fff; }
.nw-filter[data-cat="更新情報"] { color: var(--blue-600); border-color: var(--blue-200, #bcd6f7); }
.nw-filter[data-cat="更新情報"].active { background: var(--blue-600); border-color: var(--blue-600); color: #fff; }
.nw-filter[data-cat="採用"] { color: var(--teal-600); border-color: #b9e6d3; }
.nw-filter[data-cat="採用"].active { background: var(--teal-500); border-color: var(--teal-500); color: #fff; }

.nw-sort {
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
  border: none; background: none; font-family: var(--font); font-size: 14.5px; font-weight: 800; color: var(--navy-800);
}
.nw-sort svg { color: var(--blue-500); transition: transform 0.2s ease; }
.nw-sort.asc svg { transform: rotate(180deg); }

.nw-list { list-style: none; margin: 0; padding: 0; }
.nw-item {
  display: grid; grid-template-columns: 124px 110px 1fr auto; align-items: center; gap: 22px;
  padding: 20px 6px; border-top: 1px solid var(--line);
  transition: background 0.16s ease;
  cursor: pointer;
}
.nw-item:last-child { border-bottom: 1px solid var(--line); }
.nw-item:hover { background: var(--blue-50); }
.nw-date { font-size: 15px; font-weight: 700; color: var(--ink-500); font-variant-numeric: tabular-nums; }
.nw-badge { justify-self: start; font-size: 12.5px; font-weight: 800; padding: 5px 14px; border-radius: 999px; white-space: nowrap; letter-spacing: 0.03em; }
.nw-badge.重要 { background: #fdeef0; color: #d9482f; }
.nw-badge.お知らせ { background: #e7f0ff; color: var(--blue-600); }
.nw-badge.更新情報 { background: #e9eefb; color: #4f6ef0; }
.nw-badge.採用 { background: #e3f6ee; color: var(--teal-600); }
.nw-title { font-size: 16px; font-weight: 700; color: var(--ink-900); line-height: 1.55; }
.nw-more { display: inline-flex; align-items: center; gap: 8px; font-size: 14.5px; font-weight: 700; color: var(--blue-600); white-space: nowrap; transition: gap 0.16s ease; }
.nw-item:hover .nw-more { gap: 12px; }
.nw-more svg { color: var(--blue-500); }

.nw-empty { padding: 50px 0; text-align: center; color: var(--ink-400, #8595ab); font-size: 15px; }
.nw-loading { padding: 50px 0; text-align: center; color: var(--ink-500); font-size: 15px; }

/* 行全体をリンク化 */
.nw-item-link {
  display: contents;
  color: inherit;
}

@media (max-width: 720px) {
  .nw-card { padding: 26px 18px 30px; }
  .nw-item { grid-template-columns: 1fr auto; gap: 8px 14px; row-gap: 8px; padding: 18px 4px; }
  .nw-date { grid-row: 1; }
  .nw-badge { grid-row: 1; grid-column: 2; justify-self: end; }
  .nw-title { grid-column: 1 / -1; grid-row: 2; }
  .nw-more { grid-column: 1 / -1; grid-row: 3; justify-self: start; }
}
</style>
</head>
<body>
<div id="bg-slot"></div>
<div class="page">
  <div id="header-slot"></div>

  <main class="nw-main" data-screen-label="お知らせ">
    <div class="nw-wrap">

      <div class="nw-hero">
        <div class="nw-hero__eyebrow">News</div>
        <h1>お知らせ</h1>
        <div class="nw-hero__rule"></div>
        <p>当社からの最新情報をお届けします。</p>
      </div>

      <section class="nw-card">
        <div class="nw-toolbar">
          <div class="nw-filters" id="filters"></div>
          <button class="nw-sort" id="sort-btn" type="button">
            <span data-ic="sort"></span><span id="sort-label">新しい順</span><span data-ic="caret"></span>
          </button>
        </div>
        <ul class="nw-list" id="news-list"><li class="nw-loading">読み込み中...</li></ul>
      </section>

    </div>
  </main>

  <div id="footer-slot"></div>
</div>

<script src="site.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="news-data.js"></script>
<script src="news-client.js"></script>
<script>
const NIC = {
  sort: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M7 20l-3-3M7 4l3 3"/><path d="M13 6h7M13 12h5M13 18h3"/></svg>',
  caret: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
  arrow: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
};
document.querySelectorAll("[data-ic]").forEach(el => { el.innerHTML = NIC[el.dataset.ic] || ""; });

const CATS = ["すべて", "重要", "更新情報", "採用"];
let activeCat = "すべて";
let newest = true;
let ALL = [];   // Supabase / フォールバックから取得した全件

document.getElementById("filters").innerHTML = CATS.map(c =>
  `<button class="nw-filter${c === "すべて" ? " active" : ""}" data-cat="${c}" type="button">${c}</button>`).join("");

function fmtDate(s) {
  if (!s) return "";
  return String(s).replaceAll("-", ".").slice(0, 10);
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function render() {
  let items = ALL.filter(n => activeCat === "すべて" || n.cat === activeCat);
  items = items.slice().sort((a, b) => {
    const av = String(a.date), bv = String(b.date);
    return newest ? bv.localeCompare(av) : av.localeCompare(bv);
  });
  const list = document.getElementById("news-list");
  if (!items.length) { list.innerHTML = `<li class="nw-empty">該当するお知らせはありません。</li>`; return; }
  list.innerHTML = items.map(n => `
    <li class="nw-item">
      <a class="nw-item-link" href="/news-detail?id=${encodeURIComponent(n.id)}">
        <span class="nw-date">${fmtDate(n.date)}</span>
        <span class="nw-badge ${esc(n.cat)}">${esc(n.cat)}</span>
        <span class="nw-title">${esc(n.title)}</span>
        <span class="nw-more">詳しく見る ${NIC.arrow}</span>
      </a>
    </li>`).join("");
}

async function load() {
  const list = document.getElementById("news-list");
  list.innerHTML = `<li class="nw-loading">読み込み中...</li>`;
  try {
    ALL = await NewsClient.fetchPublishedNews();
  } catch (e) {
    console.error(e);
    ALL = [];
  }
  render();
}
load();

document.getElementById("filters").addEventListener("click", (e) => {
  const btn = e.target.closest(".nw-filter");
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll(".nw-filter").forEach(b => b.classList.toggle("active", b === btn));
  render();
});
document.getElementById("sort-btn").addEventListener("click", () => {
  newest = !newest;
  document.getElementById("sort-btn").classList.toggle("asc", !newest);
  document.getElementById("sort-label").textContent = newest ? "新しい順" : "古い順";
  render();
});
</script>
</body>
</html>
